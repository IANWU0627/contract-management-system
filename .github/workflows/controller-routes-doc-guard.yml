name: Controller Routes Doc Guard

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  check-controller-routes-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate controller route baseline
        run: python3 scripts/check-controller-routes-baseline.py
