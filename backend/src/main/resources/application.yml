server:
  port: 8081

spring:
  application:
    name: toy-contract
  task:
    scheduling:
      pool:
        size: 2

  # H2 Database (开发用 - 已禁用)
  # datasource:
  #   url: jdbc:h2:file:./data/contractdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
  #   driver-class-name: org.h2.Driver
  #   username: sa
  #   password: 
  # sql:
  #   init:
  #     mode: always
  #     schema-locations: classpath:schema.sql
  #     data-locations: classpath:data.sql
  #     continue-on-error: true
  # h2:
  #   console:
  #     enabled: true
  #     path: /h2-console

  # Flyway：生产建议启用并由 Flyway 独占 DDL；本地若用 spring.sql.init + schema.sql 可保持 false，避免双轨脚本分叉。
  flyway:
    enabled: false

  # MySQL Database (生产用)
  datasource:
    url: jdbc:mysql://localhost:3306/contract_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root 
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql,classpath:db/migration/V1__init_schema.sql
      data-locations: classpath:data.sql
      continue-on-error: true

  servlet:
    multipart:
      max-file-size: 40MB
      max-request-size: 40MB

# MyBatis Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.contracthub.entity

# JWT
jwt:
  secret: ${JWT_SECRET:ToyContract-Secret-Key-For-JWT-Token-Generation-2024}
  expiration: 86400000  # 24小时
  refresh-expiration: 604800000  # 7天

# External API Security
external:
  api-key: ${EXTERNAL_API_KEY:}

# File Upload
file:
  upload-dir: ./uploads

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS:*}

# WebSocket
app:
  websocket:
    allowed-origins: ${WS_ALLOWED_ORIGINS:${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}}

# Logging
logging:
  level:
    root: INFO
    com.contracthub: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ./logs/application.log
    max-size: 10MB
    max-history: 30

# Rate Limiting
rate-limit:
  enabled: false
  max-requests-per-minute: 60

# Actuator (health for probes; other endpoints off by default)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    defaults:
      enabled: true
