# 生产：通过 --spring.profiles.active=prod 启用
#
# 数据库：已有线上库时由 Flyway 管理版本；首次连接会在库中写入 baseline，不会重跑已有脚本。
# 请确认线上结构已与仓库迁移一致后再上线；若线上落后于某版本，勿盲目把 baseline 拉到最高，应先把库对齐或调低 baseline-version。
spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # 与仓库当前最后一条迁移版本一致（见 db/migration/V1.16.0__*.sql）；新脚本用更高版本号。
    baseline-version: "1.16.0"
    validate-on-migrate: true
  sql:
    init:
      # 生产禁用 spring.sql.init，避免与 Flyway 双轨执行 DDL/DML；数据已在现网。
      mode: never

logging:
  level:
    root: WARN
    com.contracthub: INFO
    org.springframework.web: WARN
  file:
    name: ./logs/application-prod.log
    max-size: 20MB
    max-history: 60

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info
